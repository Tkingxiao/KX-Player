<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KX音乐播放器</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/fonts.css" />
</head>
<body>

<div id="bg-layer"><img id="bg-img" src="" alt="" draggable="false" /></div>

<div id="app">
  <div id="titlebar">
    <div id="titlebar-logo">
      <img src="/favicon.ico" alt="" width="22" height="22" />
      <span>KX Player</span>
    </div>
    <div id="titlebar-center">
      <div id="titlebar-search">
        <span class="search-prefix">
          <button id="search-back" class="hidden"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg></button>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="tb-search-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="search-input" placeholder="搜索音乐..." autocomplete="off" />
        <button id="search-clear" class="hidden">&times;</button>
      </div>
    </div>
    <div id="titlebar-controls">
      <button id="btn-theme" title="主题设置" class="tb-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
      <button id="btn-import" title="导入文件夹" class="tb-btn tb-import"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      <button id="btn-min" title="最小化" class="tb-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button id="btn-max" title="最大化" class="tb-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" id="max-icon"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></button>
      <button id="btn-close" title="关闭" class="tb-btn tb-close"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>

  <div id="main-layout">
    <aside id="sidebar">
      <nav id="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">音乐库</div>
          <button class="nav-item active" data-view="all">全部音乐</button>
          <button class="nav-item" data-view="recent">最近播放</button>
          <button class="nav-item" data-view="tools">工具</button>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">文件夹</div>
          <div id="folder-list"></div>
          <button class="nav-item" id="btn-add-folder"><span style="display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>导入文件夹</span></button>
          <button class="nav-item" style="margin-top:0" id="btn-rescan"><span style="display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>重新扫描</span></button>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">收藏夹 <button class="btn-new-fav" id="btn-new-fav">+ 新建</button></div>
          <div id="fav-list"></div>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">播放列表 <button class="btn-new-pl" id="btn-new-playlist">+ 新建</button></div>
          <div id="playlist-list"></div>
        </div>
      </nav>
    </aside>

    <main id="content">
      <div id="content-toolbar">
        <div id="breadcrumb"></div>
      </div>
      <div id="content-area"></div>
    </main>
  </div>

  <div id="player-bar">
    <div class="player-left">
      <div id="player-cover" title="点击查看歌词">
        <div class="cover-placeholder"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
        <img id="player-cover-img" src="" alt="" style="display:none" />
      </div>
      <div id="player-info"><div id="player-title">未在播放</div><div id="player-artist">选择一首歌曲开始</div></div>
    </div>
    <div class="player-center">
      <div class="player-controls">
        <button id="btn-mode" title="顺序循环" class="pc-btn">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" id="mode-icon-sequential"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h10"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H7"/></svg>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" id="mode-icon-shuffle" style="display:none"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" id="mode-icon-repeat1" style="display:none"><circle cx="12" cy="12" r="8"/><polyline points="10,8 12,6 14,8"/><text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="currentColor" stroke="none">1</text></svg>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" id="mode-icon-once" style="display:none"><polyline points="9,18 15,12 9,6"/><line x1="3" y1="18" x2="3" y2="6"/><rect x="16" y="6" width="6" height="2" rx="1"/><rect x="16" y="16" width="6" height="2" rx="1"/></svg>
        </button>
        <button id="btn-prev" title="上一首" class="pc-btn"><svg viewBox="0 0 24 24" width="25" height="25" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button id="btn-play" title="播放/暂停" class="pc-btn-play">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="white" id="icon-play"><polygon points="7.5,3 21,12 7.5,21"/></svg>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="white" id="icon-pause" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button id="btn-next" title="下一首" class="pc-btn"><svg viewBox="0 0 24 24" width="25" height="25" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        <button id="btn-playlist-panel" title="当前播放" class="pc-btn"><svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
      </div>
      <div class="player-progress">
        <span id="progress-current">00:00</span>
        <div id="progress-bar"><div id="progress-fill"></div><div id="progress-handle"></div></div>
        <span id="progress-duration">00:00</span>
      </div>
    </div>
    <div class="player-right">
      <button id="btn-volume" title="静音" class="pc-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" id="vol-high"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" id="vol-mid" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" id="vol-low" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" opacity="0.3"/></svg>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" id="vol-mute" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <div id="volume-bar"><div id="volume-fill"></div></div>
      <span id="volume-text">70</span>
    </div>
  </div>
</div>

<!-- Panel -->
<div id="playlist-panel" class="hidden">
  <div class="panel-overlay" id="playlist-overlay"></div>
  <div class="panel-content">
    <div class="panel-header"><span>当前播放</span><span id="panel-count">0 首</span><button class="panel-close">&times;</button></div>
    <div class="panel-body" id="panel-body"><div class="panel-empty">播放列表为空</div></div>
  </div>
</div>

<!-- Settings -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content settings-content">
    <button class="modal-close">&times;</button>
    <h2>主题设置</h2>
    <div class="settings-group"><label>主题色</label>
      <div class="color-picker-full">
        <canvas id="cp-canvas" width="260" height="260"></canvas>
        <div class="cp-presets" id="cp-presets">
          <button class="cp-preset" data-clr="#E63A2E" style="background:#E63A2E"></button>
          <button class="cp-preset" data-clr="#E91E63" style="background:#E91E63"></button>
          <button class="cp-preset" data-clr="#9C27B0" style="background:#9C27B0"></button>
          <button class="cp-preset" data-clr="#2196F3" style="background:#2196F3"></button>
          <button class="cp-preset" data-clr="#00BCD4" style="background:#00BCD4"></button>
          <button class="cp-preset" data-clr="#4CAF50" style="background:#4CAF50"></button>
          <button class="cp-preset" data-clr="#FF9800" style="background:#FF9800"></button>
          <button class="cp-preset" data-clr="#607D8B" style="background:#607D8B"></button>
        </div>
      </div>
    </div>
    <div class="settings-group"><label>外观模式</label><div class="th-btn-group"><button id="theme-dark" class="th-btn">深色</button><button id="theme-light" class="th-btn active">浅色</button></div></div>
    <div class="settings-group"><label>侧边栏透明度</label><input type="range" id="sidebar-opacity" min="0" max="100" value="100" step="1"><span id="sidebar-opacity-val">100%</span></div>
    <div class="settings-group"><label>顶栏透明度</label><input type="range" id="titlebar-opacity" min="0" max="100" value="100" step="1"><span id="titlebar-opacity-val">100%</span></div>
    <div class="settings-group"><label>播放栏透明度</label><input type="range" id="player-opacity" min="0" max="100" value="100" step="1"><span id="player-opacity-val">100%</span></div>
    <div class="settings-group"><label>背景图</label>
      <div class="bg-upload-area" id="bg-upload-area">
        <div class="bg-preview-wrap hidden" id="bg-preview-wrap">
          <div class="bg-preview" id="bg-preview" title="点击更换背景"></div>
          <div class="bg-actions">
            <button class="btn-sm btn-secondary" id="btn-edit-bg">编辑</button>
            <button class="btn-sm btn-danger" id="btn-bg-remove">移除</button>
          </div>
        </div>
        <button class="btn-secondary" id="btn-bg-upload"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>选择背景图片</button>
      </div>
    </div>
  </div>
</div>

<!-- Image Editor -->
<div id="img-editor-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content img-editor-content">
    <button class="modal-close">&times;</button>
    <h2>背景图编辑</h2>
    <div class="img-editor-layout">
      <div class="img-editor-preview-col">
        <div class="img-editor-preview" id="img-editor-preview">
          <div class="img-editor-layer" id="img-editor-layer">
            <img id="img-edit-img" src="" alt="" draggable="false" />
          </div>
        </div>
        <div class="img-editor-preview-label">预览窗口 = 最终背景效果</div>
      </div>
      <div class="img-editor-controls">
        <div class="img-editor-ctrl-row">
          <label>缩放</label>
          <div class="img-editor-zoom-row">
            <button class="btn-small" id="btn-zoom-out" title="缩小">−</button>
            <input type="range" id="img-zoom" min="10" max="400" value="100" />
            <button class="btn-small" id="btn-zoom-in" title="放大">+</button>
            <span id="img-zoom-val">100%</span>
          </div>
          <div class="ctrl-hint">提示: 预览框内滚轮缩放，拖拽移动图片</div>
        </div>
        <div class="img-editor-ctrl-row"><label>透明度</label><input type="range" id="img-opacity" min="5" max="95" value="72" /><span id="img-opacity-val">72%</span></div>
        <div class="img-editor-ctrl-row"><label>模糊度</label><input type="range" id="img-blur" min="0" max="40" value="0" /><span id="img-blur-val">0px</span></div>
        <div class="img-editor-ctrl-row"><label>位置偏移</label><span id="img-offset-text">X: 0% / Y: 0%</span></div>
        <div class="img-editor-actions">
          <button class="btn-primary" id="btn-img-auto-fit">自动适配</button>
          <button class="btn-secondary" id="btn-img-reset">重置</button>
          <button class="btn-primary" id="btn-img-save" style="background:#22c55e;border-color:#22c55e;">保存设置</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toasts -->
<div id="import-toasts"></div>

<!-- Speaker -->
<div id="speaker-popup" class="hidden">
  <div class="speaker-popup-header">音频输出设备</div>
  <div id="speaker-device-list"></div>
</div>

<!-- Context menus -->
<div id="ctx-menu" class="hidden"></div>
<div id="ctx-playlist-sub" class="hidden" style="position:fixed;z-index:510;background:var(--modal-bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px 0;min-width:180px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.35)"></div>

<!-- Custom Confirm -->
<div id="confirm-modal" class="modal hidden">
  <div class="modal-overlay" id="confirm-overlay"></div>
  <div class="modal-content confirm-dialog-content">
    <h3 id="confirm-title" style="font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text)"></h3>
    <p id="confirm-message" style="font-size:14px;color:var(--text-sub);margin-bottom:20px;line-height:1.6"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-secondary" id="confirm-cancel-btn" style="padding:8px 24px">取消</button>
      <button class="btn-danger" id="confirm-ok-btn" style="padding:8px 24px">确定</button>
    </div>
  </div>
</div>

<script type="module" src="/script.js"></script>
</body>
</html>
